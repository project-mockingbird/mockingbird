# Mockingbird compose template.
#
# Mounts the host workspace directory at /workspaces inside the container.
# All mockingbird state (project registry + engine cache) lives UNDER that
# mount, so there is exactly one volume declaration.
#
# Default mount: ${MOCKINGBIRD_WORKSPACE}:/workspaces
#   override MOCKINGBIRD_WORKSPACE in .env to point at a broader directory
#   (e.g. C:/projects on Windows, ~/code on macOS/Linux) if your repos live
#   elsewhere.
#
# On disk under the workspace root:
#   config.mockingbird      - team-shared project registry (commit this)
#   .mockingbird/cache/     - engine cache (auto-gitignored)
services:
  mockingbird:
    image: ${MOCKINGBIRD_IMAGE}
    container_name: ${COMPOSE_PROJECT_NAME}
    ports:
      # Bind to loopback only so a developer on a coffee-shop / hostile LAN
      # doesn't accidentally expose mockingbird to the network. Drop the
      # 127.0.0.1 prefix to publish to all host interfaces.
      - "127.0.0.1:${MOCKINGBIRD_PORT}:${MOCKINGBIRD_PORT}"
    environment:
      PORT: ${MOCKINGBIRD_PORT}
      HOST: ${MOCKINGBIRD_HOST}
      # Container-side workspace path - distinct from the host-side
      # MOCKINGBIRD_WORKSPACE in .env (which is the volume SOURCE path).
      # The EXDEV staging fix in src/engine/insert-branch.ts reads this env
      # var; without it, atomic writes fall back to /tmp (different FS than
      # the bind mount) and rename fails with EXDEV.
      MOCKINGBIRD_WORKSPACE: /workspaces
      MOCKINGBIRD_CONFIG_PATH: /workspaces/config.mockingbird
      INDEX_CACHE_PATH: /workspaces/.mockingbird/cache/index.json.gz
      # Optional Layout Service synthetic-fallback site root. Empty by default;
      # set per-project at runtime via the wizard, or pin globally via .env.
      SITE_ROOT_PATH: ${SITE_ROOT_PATH:-}
      # Security knobs - empty defaults to same-origin only.
      MOCKINGBIRD_ALLOWED_ORIGINS: ${MOCKINGBIRD_ALLOWED_ORIGINS:-}
      MOCKINGBIRD_WS_ALLOWED_ORIGINS: ${MOCKINGBIRD_WS_ALLOWED_ORIGINS:-}
      MOCKINGBIRD_GRAPHQL_QUERY_DEPTH: ${MOCKINGBIRD_GRAPHQL_QUERY_DEPTH:-20}
      # PowerShell scripting (SPE) tuning.
      MOCKINGBIRD_SPE_SESSION_TTL_MIN: ${MOCKINGBIRD_SPE_SESSION_TTL_MIN:-30}
      MOCKINGBIRD_SPE_MAX_SESSIONS: ${MOCKINGBIRD_SPE_MAX_SESSIONS:-8}
    volumes:
      - ${MOCKINGBIRD_WORKSPACE}:/workspaces
    restart: unless-stopped
