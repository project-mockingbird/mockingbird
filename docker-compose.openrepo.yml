# Reference compose for Open Repository mode.
#
# Use this compose template when you want to author against ANY repo on your
# host machine without baking a specific workspace into the container at boot.
# The web UI's first-run wizard handles project selection.
#
# Default mounts:
#   - ${MOCKINGBIRD_WORKSPACE_HOST:-./} -> /workspaces   broad host bind for project discovery
#   - ./data/state                      -> /data/state   persistent profiles + recents
#
# By default the directory containing this compose file (the repo root) is
# mounted at /workspaces - zero shell setup required. Override
# MOCKINGBIRD_WORKSPACE_HOST in .env to point at a broader directory if your
# authoring repos live elsewhere (e.g. C:/projects, ~/code, $HOME).
#
# If you want a fixed workspace baked in (e.g. for head-app integrations),
# use the env-var-driven docker-compose.yml instead.
services:
  mockingbird:
    image: projectmockingbird/mockingbird:1.0.7.0
    container_name: mockingbird
    ports:
      # Loopback-only by default - drop the 127.0.0.1 prefix to publish to all
      # host interfaces.
      - "127.0.0.1:3333:3333"
    environment:
      PORT: 3333
      HOST: 0.0.0.0
      MOCKINGBIRD_CACHE_PATH: /data/cache
      INDEX_CACHE_PATH: /data/cache/index.json.gz
      MOCKINGBIRD_WORKSPACE_ROOT: /workspaces
      # SCS_SITECORE_JSON intentionally unset - the first-run wizard picks
      # the workspace at runtime via /api/fs/list and /api/projects/open.
    volumes:
      # Workspace bind: everything you might want to author against has to be
      # reachable under this mount. Default is the directory you ran compose
      # from (the repo root). Override via MOCKINGBIRD_WORKSPACE_HOST in .env
      # to widen (e.g. C:/projects on Windows, ~/code on macOS/Linux).
      - ${MOCKINGBIRD_WORKSPACE_HOST:-./}:/workspaces
      # State mount: profiles, recent projects, user prefs. Lives on the host
      # next to the compose file so it survives container rebuilds + image
      # upgrades. Mirrors the cache-mount convention.
      - ./data/state:/data/state
      # Cache volume (existing).
      - mockingbird-cache:/data/cache
    restart: unless-stopped

volumes:
  mockingbird-cache:
